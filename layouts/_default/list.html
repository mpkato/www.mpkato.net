{{ define "main" }}
<article class="page">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
  </header>
  <div class="prose">
    {{ .Content }}
  </div>
  {{ if .Pages }}
  <ul class="plain-list">
    {{ range .Pages }}
    <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
    {{ end }}
  </ul>
  {{ end }}
</article>
{{ end }}
