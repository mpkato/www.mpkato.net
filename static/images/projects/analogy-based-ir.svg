<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4f46e5"/>
    </marker>
    <marker id="arc" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#0891b2"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="640" height="380" rx="16" fill="#ffffff"/>
  <rect x="0" y="0" width="640" height="6" rx="3" fill="url(#g)"/>
  <text x="32" y="48" font-size="20" font-weight="700" fill="#1f2937">Analogy-based Information Retrieval</text>
  <text x="32" y="72" font-size="13" fill="#6b7280">Search the unfamiliar using what you already know</text>

  <!-- A : B -->
  <rect x="60" y="130" width="120" height="56" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="120" y="164" font-size="15" font-weight="700" fill="#4f46e5" text-anchor="middle">A (known)</text>
  <rect x="60" y="250" width="120" height="56" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="120" y="284" font-size="15" font-weight="700" fill="#4f46e5" text-anchor="middle">B (known)</text>
  <line x1="120" y1="186" x2="120" y2="250" stroke="#4f46e5" stroke-width="2" marker-end="url(#ar)"/>
  <text x="138" y="222" font-size="11" fill="#6b7280">relation</text>

  <!-- analogy bridge -->
  <line x1="180" y1="158" x2="380" y2="158" stroke="#0891b2" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arc)"/>
  <line x1="180" y1="278" x2="380" y2="278" stroke="#0891b2" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arc)"/>
  <text x="300" y="150" font-size="11" fill="#0e7490" text-anchor="middle">same relation</text>

  <!-- C : ? -->
  <rect x="384" y="130" width="120" height="56" rx="10" fill="#ecfeff" stroke="#a5f3fc"/>
  <text x="444" y="164" font-size="15" font-weight="700" fill="#0e7490" text-anchor="middle">C (query)</text>
  <rect x="384" y="250" width="120" height="56" rx="10" fill="url(#g)"/>
  <text x="444" y="284" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">? → found</text>
  <line x1="444" y1="186" x2="444" y2="250" stroke="#0891b2" stroke-width="2" marker-end="url(#arc)"/>

  <!-- example equation -->
  <rect x="528" y="150" width="92" height="116" rx="10" fill="#f8fafc" stroke="#e5e7eb"/>
  <text x="574" y="178" font-size="12" font-weight="700" fill="#1f2937" text-anchor="middle">e.g.</text>
  <text x="574" y="202" font-size="11" fill="#4f46e5" text-anchor="middle">Apple :</text>
  <text x="574" y="218" font-size="11" fill="#4f46e5" text-anchor="middle">iPod</text>
  <text x="574" y="238" font-size="11" fill="#0e7490" text-anchor="middle">Microsoft :</text>
  <text x="574" y="254" font-size="11" fill="#0e7490" text-anchor="middle">Zune</text>

  <text x="320" y="338" font-size="12" fill="#6b7280" text-anchor="middle">Query by example &amp; relational search · geographic, music, and image search by analogy</text>
</svg>
