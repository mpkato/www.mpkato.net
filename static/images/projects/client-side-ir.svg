<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4f46e5"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="640" height="380" rx="16" fill="#ffffff"/>
  <rect x="0" y="0" width="640" height="6" rx="3" fill="url(#g)"/>
  <text x="32" y="48" font-size="20" font-weight="700" fill="#1f2937">Client-side Information Retrieval</text>
  <text x="32" y="72" font-size="13" fill="#6b7280">On-device AI that proactively supports a researcher's work</text>

  <!-- laptop / on-device boundary -->
  <rect x="150" y="110" width="340" height="180" rx="14" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="320" y="134" font-size="12" font-weight="700" fill="#4f46e5" text-anchor="middle">YOUR PC — data stays on device</text>

  <circle cx="320" cy="205" r="44" fill="url(#g)"/>
  <text x="320" y="200" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">On-device</text>
  <text x="320" y="218" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">AI</text>

  <!-- privacy lock -->
  <rect x="436" y="120" width="42" height="34" rx="6" fill="#ecfeff" stroke="#0891b2"/>
  <path d="M450 120 v-6 a7 7 0 0 1 14 0 v6" fill="none" stroke="#0891b2" stroke-width="2"/>
  <circle cx="457" cy="139" r="3.5" fill="#0891b2"/>

  <!-- left: monitored activity -->
  <rect x="24" y="150" width="104" height="92" rx="10" fill="#fff" stroke="#e5e7eb"/>
  <text x="76" y="176" font-size="12" font-weight="700" fill="#1f2937" text-anchor="middle">Research</text>
  <text x="76" y="194" font-size="12" font-weight="700" fill="#1f2937" text-anchor="middle">activity</text>
  <text x="76" y="218" font-size="11" fill="#6b7280" text-anchor="middle">reading,</text>
  <text x="76" y="232" font-size="11" fill="#6b7280" text-anchor="middle">searching</text>
  <line x1="128" y1="196" x2="150" y2="200" stroke="#4f46e5" stroke-width="2" marker-end="url(#ar)"/>

  <!-- right: proactive delivery -->
  <rect x="512" y="150" width="104" height="92" rx="10" fill="#fff" stroke="#e5e7eb"/>
  <text x="564" y="180" font-size="12" font-weight="700" fill="#1f2937" text-anchor="middle">Proactive</text>
  <text x="564" y="198" font-size="12" font-weight="700" fill="#1f2937" text-anchor="middle">info</text>
  <text x="564" y="222" font-size="11" fill="#6b7280" text-anchor="middle">right time</text>
  <line x1="490" y1="200" x2="512" y2="196" stroke="#4f46e5" stroke-width="2" marker-end="url(#ar)"/>

  <text x="320" y="328" font-size="12" fill="#6b7280" text-anchor="middle">Monitors activity locally · retrieves needed information autonomously · preserves privacy</text>
</svg>
