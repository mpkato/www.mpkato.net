<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4f46e5"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="640" height="380" rx="16" fill="#ffffff"/>
  <rect x="0" y="0" width="640" height="6" rx="3" fill="url(#g)"/>
  <text x="32" y="48" font-size="20" font-weight="700" fill="#1f2937">Information Need Elicitation</text>
  <text x="32" y="72" font-size="13" fill="#6b7280">Estimate what a user really wants from implicit signals</text>

  <!-- user -->
  <circle cx="92" cy="190" r="30" fill="#eef2ff" stroke="#c7d2fe"/>
  <circle cx="92" cy="180" r="11" fill="#4f46e5"/>
  <path d="M72 206 a20 16 0 0 1 40 0" fill="#4f46e5"/>
  <text x="92" y="240" font-size="12" font-weight="700" fill="#1f2937" text-anchor="middle">User</text>

  <!-- signals -->
  <g font-size="11" font-weight="700">
    <rect x="160" y="116" width="120" height="32" rx="16" fill="#ecfeff" stroke="#a5f3fc"/>
    <text x="220" y="137" fill="#0e7490" text-anchor="middle">clicks</text>
    <rect x="160" y="174" width="120" height="32" rx="16" fill="#ecfeff" stroke="#a5f3fc"/>
    <text x="220" y="195" fill="#0e7490" text-anchor="middle">brain signals</text>
    <rect x="160" y="232" width="120" height="32" rx="16" fill="#ecfeff" stroke="#a5f3fc"/>
    <text x="220" y="253" fill="#0e7490" text-anchor="middle">sensors</text>
  </g>
  <line x1="120" y1="184" x2="160" y2="134" stroke="#0891b2" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="124" y1="190" x2="160" y2="190" stroke="#0891b2" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="120" y1="198" x2="160" y2="246" stroke="#0891b2" stroke-width="2" marker-end="url(#ar)"/>

  <!-- estimator -->
  <line x1="280" y1="132" x2="330" y2="180" stroke="#4f46e5" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="280" y1="190" x2="330" y2="190" stroke="#4f46e5" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="280" y1="248" x2="330" y2="200" stroke="#4f46e5" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="334" y="156" width="132" height="68" rx="14" fill="url(#g)"/>
  <text x="400" y="186" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Estimate</text>
  <text x="400" y="205" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">information need</text>
  <line x1="466" y1="190" x2="510" y2="190" stroke="#4f46e5" stroke-width="2" marker-end="url(#ar)"/>

  <!-- need -->
  <rect x="514" y="150" width="100" height="80" rx="12" fill="#fff" stroke="#e5e7eb"/>
  <text x="564" y="184" font-size="22" font-weight="700" fill="#4f46e5" text-anchor="middle">? → !</text>
  <text x="564" y="210" font-size="11" fill="#6b7280" text-anchor="middle">what to show</text>

  <text x="320" y="330" font-size="12" fill="#6b7280" text-anchor="middle">Query formulation &amp; suggestion · actively and efficiently surface hidden needs</text>
</svg>
