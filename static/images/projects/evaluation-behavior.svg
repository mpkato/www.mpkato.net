<svg xmlns="http://www.w3.org/2000/svg" width="640" height="380" viewBox="0 0 640 380" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4f46e5"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="640" height="380" rx="16" fill="#ffffff"/>
  <rect x="0" y="0" width="640" height="6" rx="3" fill="url(#g)"/>
  <text x="32" y="48" font-size="20" font-weight="700" fill="#1f2937">IR Evaluation &amp; Search Behavior</text>
  <text x="32" y="72" font-size="13" fill="#6b7280">Compare rankers from real clicks by interleaving their results</text>

  <!-- ranker A -->
  <rect x="28" y="108" width="120" height="118" rx="10" fill="#fff" stroke="#c7d2fe"/>
  <text x="88" y="130" font-size="12" font-weight="700" fill="#4f46e5" text-anchor="middle">Ranker A</text>
  <rect x="44" y="142" width="88" height="14" rx="3" fill="#c7d2fe"/>
  <rect x="44" y="164" width="88" height="14" rx="3" fill="#c7d2fe"/>
  <rect x="44" y="186" width="88" height="14" rx="3" fill="#c7d2fe"/>

  <!-- ranker B -->
  <rect x="28" y="236" width="120" height="118" rx="10" fill="#fff" stroke="#a5f3fc"/>
  <text x="88" y="258" font-size="12" font-weight="700" fill="#0e7490" text-anchor="middle">Ranker B</text>
  <rect x="44" y="270" width="88" height="14" rx="3" fill="#a5f3fc"/>
  <rect x="44" y="292" width="88" height="14" rx="3" fill="#a5f3fc"/>
  <rect x="44" y="314" width="88" height="14" rx="3" fill="#a5f3fc"/>

  <line x1="148" y1="170" x2="214" y2="210" stroke="#4f46e5" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="148" y1="292" x2="214" y2="252" stroke="#0891b2" stroke-width="2" marker-end="url(#ar)"/>

  <!-- interleaved list -->
  <rect x="218" y="120" width="160" height="220" rx="12" fill="#f8fafc" stroke="#e5e7eb"/>
  <text x="298" y="144" font-size="12" font-weight="700" fill="#1f2937" text-anchor="middle">Interleaved list</text>
  <g>
    <rect x="234" y="156" width="128" height="22" rx="4" fill="#c7d2fe"/>
    <rect x="234" y="184" width="128" height="22" rx="4" fill="#a5f3fc"/>
    <rect x="234" y="212" width="128" height="22" rx="4" fill="#c7d2fe"/>
    <rect x="234" y="240" width="128" height="22" rx="4" fill="#a5f3fc"/>
    <rect x="234" y="268" width="128" height="22" rx="4" fill="#c7d2fe"/>
  </g>
  <circle cx="388" cy="195" r="7" fill="none" stroke="#4f46e5" stroke-width="2"/>
  <circle cx="388" cy="195" r="2.5" fill="#4f46e5"/>
  <circle cx="388" cy="279" r="7" fill="none" stroke="#0891b2" stroke-width="2"/>
  <circle cx="388" cy="279" r="2.5" fill="#0891b2"/>
  <text x="298" y="316" font-size="11" fill="#6b7280" text-anchor="middle">user clicks</text>

  <line x1="378" y1="230" x2="430" y2="230" stroke="#4f46e5" stroke-width="2" marker-end="url(#ar)"/>

  <!-- outcome -->
  <rect x="434" y="150" width="178" height="160" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="523" y="178" font-size="12" font-weight="700" fill="#4f46e5" text-anchor="middle">Which ranker wins?</text>
  <rect x="454" y="196" width="138" height="16" rx="8" fill="#fff" stroke="#cbd5e1"/>
  <rect x="454" y="196" width="92" height="16" rx="8" fill="url(#g)"/>
  <text x="523" y="234" font-size="12" fill="#475569" text-anchor="middle">A preferred (credit clicks)</text>
  <text x="523" y="270" font-size="11" fill="#6b7280" text-anchor="middle">unbiased · low-variance</text>
  <text x="523" y="288" font-size="11" fill="#6b7280" text-anchor="middle">online comparison</text>

  <text x="320" y="364" font-size="11" fill="#6b7280" text-anchor="middle">Interleaving / multileaving · NTCIR evaluation campaigns · search &amp; purchase behavior analysis</text>
</svg>
